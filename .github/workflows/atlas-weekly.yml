name: ATLAS Weekly Cycle
on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit/deploy)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  atlas:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git identity
        run: |
          git config user.name "atlas-bot"
          git config user.email "atlas-bot@users.noreply.github.com"

      - name: Install netlify-cli
        run: npm install -g netlify-cli

      - name: Run ATLAS
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          ATLAS_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node scripts/atlas.js

      - name: Push changes
        if: success() && inputs.dry_run != 'true'
        run: git push
